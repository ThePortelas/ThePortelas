<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hector & Bianca • Gallery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f7f4ef;
      --text: #222;
      --accent: #b88a4a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: "Montserrat", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    a { text-decoration: none; color: inherit; }
    img { display: block; max-width: 100%; }

    /* HEADER */
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(247,244,239,0.96);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    .header-inner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0.8rem 1.2rem;
      text-align: center;
    }

    .site-title {
      font-family: "Playfair Display", serif;
      font-size: 1.2rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    nav ul {
      list-style: none;
      display: inline-flex;
      gap: 1.4rem;
      font-size: 0.75rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      flex-wrap: wrap;
      justify-content: center;
    }

    nav a {
      position: relative;
      padding-bottom: 0.2rem;
    }

    nav a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 0;
      height: 1px;
      background: var(--accent);
      transition: width 0.25s ease;
    }

    nav a.active::after,
    nav a:hover::after {
      width: 100%;
    }

    /* PAGE HEADER */
    .gallery-header {
      text-align: center;
      margin: 2.6rem 0 2.1rem;
      padding: 0 1rem;
    }

    .gallery-eyebrow {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: #777;
      margin-bottom: 0.35rem;
    }

    .gallery-title {
      font-family: "Playfair Display", serif;
      font-size: 2rem;
      margin-bottom: 0.55rem;
      letter-spacing: 0.03em;
    }

    .gallery-sub {
      max-width: 640px;
      margin: 0 auto;
      font-size: 0.92rem;
      color: #666;
    }

    /* STACKED IMAGES */
    .gallery {
      max-width: 900px;
      margin: 0 auto 3rem;
      padding: 0 1rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .gallery figure {
      margin: 0;
    }

    .gallery img {
      width: 100%;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
      cursor: pointer;
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    .gallery img:hover {
      transform: scale(1.01);
      box-shadow: 0 16px 34px rgba(0,0,0,0.14);
    }

    /* LIGHTBOX */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.94);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 2rem;
    }

    .lightbox.show {
      display: flex;
    }

    .lightbox-inner {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-image-wrap {
      position: relative;
      max-width: 92vw;
      max-height: 86vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-image-wrap img {
      max-width: 92vw;
      max-height: 86vh;
      border-radius: 12px;
      box-shadow: 0 18px 44px rgba(0,0,0,0.28);
      opacity: 1;
      transition: opacity 0.35s ease;
    }

    .lightbox-image-wrap img.is-fading {
      opacity: 0.18;
    }

    .lightbox-btn {
      position: absolute;
      color: rgba(255,255,255,0.92);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      width: 46px;
      height: 46px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      backdrop-filter: blur(6px);
      transition: background 0.25s ease, transform 0.25s ease;
      font-size: 1.4rem;
      line-height: 1;
    }

    .lightbox-btn:hover {
      background: rgba(255,255,255,0.14);
      transform: scale(1.04);
    }

    .lightbox-close {
      top: 18px;
      right: 18px;
    }

    .lightbox-prev {
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
    }

    .lightbox-prev:hover {
      transform: translateY(-50%) scale(1.04);
    }

    .lightbox-next {
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
    }

    .lightbox-next:hover {
      transform: translateY(-50%) scale(1.04);
    }

    .lightbox-count {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.82);
      font-size: 0.82rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.8rem;
      color: #777;
    }

    footer span {
      font-family: "Playfair Display", serif;
      color: var(--accent);
    }

    @media (max-width: 700px) {
      .gallery {
        gap: 1.35rem;
      }

      .gallery-title {
        font-size: 1.7rem;
      }

      .lightbox {
        padding: 1rem;
      }

      .lightbox-btn {
        width: 40px;
        height: 40px;
        font-size: 1.15rem;
      }

      .lightbox-prev {
        left: 10px;
      }

      .lightbox-next {
        right: 10px;
      }

      .lightbox-close {
        top: 10px;
        right: 10px;
      }

      .lightbox-count {
        bottom: 12px;
        font-size: 0.72rem;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="header-inner">
    <div class="site-title">HECTOR &amp; BIANCA</div>
    <nav>
      <ul>
        <li><a href="index.html#home">Home</a></li>
        <li><a href="gallery.html" class="active">Gallery</a></li>
        <li><a href="index.html#schedule">Schedule</a></li>
        <li><a href="wedding-party.html">Wedding Party</a></li>
      </ul>
    </nav>
  </div>
</header>

<div class="gallery-header">
  <div class="gallery-eyebrow">Gallery</div>
  <h1 class="gallery-title">A Little Drive With Us</h1>
  <p class="gallery-sub">
    A few of our favorite moments so far — Napa light, long drives, and everything in between.
  </p>
</div>

<section class="gallery" id="gallery">
  <figure><img src="images/napa-1.jpg" alt="Hector and Bianca in Napa" /></figure>
  <figure><img src="images/napa-2.jpg" alt="Couple portrait in Napa" /></figure>
  <figure><img src="images/napa-3.jpg" alt="Romantic Napa photo" /></figure>
  <figure><img src="images/napa-4.jpg" alt="Engagement moment outdoors" /></figure>
  <figure><img src="images/napa-5.jpg" alt="Hector and Bianca smiling together" /></figure>
  <figure><img src="images/napa-7.jpg" alt="Scenic engagement portrait" /></figure>
  <figure><img src="images/napa-8.jpg" alt="Outdoor couple portrait" /></figure>
  <figure><img src="images/napa-9.jpg" alt="Couple photo in Napa light" /></figure>
  <figure><img src="images/napa-12.jpg" alt="Elegant engagement session portrait" /></figure>
  <figure><img src="images/napa-13.jpg" alt="Romantic Napa couple portrait" /></figure>
  <figure><img src="images/napa-15.jpg" alt="Editorial outdoor engagement photo" /></figure>
  <figure><img src="images/napa-18.jpg" alt="Quiet moment together in Napa" /></figure>
  <figure><img src="images/napa-19.jpg" alt="Couple enjoying Napa together" /></figure>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" aria-hidden="true">
  <div class="lightbox-inner">
    <button class="lightbox-btn lightbox-close" id="lightboxClose" aria-label="Close gallery">&times;</button>
    <button class="lightbox-btn lightbox-prev" id="lightboxPrev" aria-label="Previous image">&#10094;</button>

    <div class="lightbox-image-wrap">
      <img id="lightboxImg" src="" alt="" />
    </div>

    <button class="lightbox-btn lightbox-next" id="lightboxNext" aria-label="Next image">&#10095;</button>
    <div class="lightbox-count" id="lightboxCount">1 / 1</div>
  </div>
</div>

<footer>
  <div>With love, <span>Hector &amp; Bianca</span></div>
  <div>October 3, 2026 • Napa, California</div>
</footer>

<script>
  const galleryImages = Array.from(document.querySelectorAll(".gallery img"));
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightboxImg");
  const lightboxClose = document.getElementById("lightboxClose");
  const lightboxPrev = document.getElementById("lightboxPrev");
  const lightboxNext = document.getElementById("lightboxNext");
  const lightboxCount = document.getElementById("lightboxCount");

  let currentIndex = 0;
  let autoPlayTimer = null;
  let touchStartX = 0;
  let touchEndX = 0;

  function updateCounter() {
    lightboxCount.textContent = `${currentIndex + 1} / ${galleryImages.length}`;
  }

  function swapImage(newIndex) {
    currentIndex = (newIndex + galleryImages.length) % galleryImages.length;
    const newSrc = galleryImages[currentIndex].src;
    const newAlt = galleryImages[currentIndex].alt || "";

    lightboxImg.classList.add("is-fading");

    setTimeout(() => {
      lightboxImg.src = newSrc;
      lightboxImg.alt = newAlt;
      updateCounter();
      requestAnimationFrame(() => {
        lightboxImg.classList.remove("is-fading");
      });
    }, 160);
  }

  function openLightbox(index) {
    lightbox.classList.add("show");
    lightbox.setAttribute("aria-hidden", "false");
    document.body.style.overflow = "hidden";
    swapImage(index);
    startAutoPlay();
  }

  function closeLightbox() {
    lightbox.classList.remove("show");
    lightbox.setAttribute("aria-hidden", "true");
    document.body.style.overflow = "";
    stopAutoPlay();
  }

  function nextImage() {
    swapImage(currentIndex + 1);
  }

  function prevImage() {
    swapImage(currentIndex - 1);
  }

  function startAutoPlay() {
    stopAutoPlay();
    autoPlayTimer = setInterval(() => {
      nextImage();
    }, 6500);
  }

  function stopAutoPlay() {
    if (autoPlayTimer) {
      clearInterval(autoPlayTimer);
      autoPlayTimer = null;
    }
  }

  galleryImages.forEach((img, index) => {
    img.addEventListener("click", () => openLightbox(index));
  });

  lightboxClose.addEventListener("click", closeLightbox);
  lightboxNext.addEventListener("click", () => {
    nextImage();
    startAutoPlay();
  });
  lightboxPrev.addEventListener("click", () => {
    prevImage();
    startAutoPlay();
  });

  lightbox.addEventListener("click", (e) => {
    if (e.target === lightbox) closeLightbox();
  });

  document.addEventListener("keydown", (e) => {
    if (!lightbox.classList.contains("show")) return;

    if (e.key === "Escape") closeLightbox();
    if (e.key === "ArrowRight") {
      nextImage();
      startAutoPlay();
    }
    if (e.key === "ArrowLeft") {
      prevImage();
      startAutoPlay();
    }
  });

  /* mobile swipe */
  lightbox.addEventListener("touchstart", (e) => {
    touchStartX = e.changedTouches[0].screenX;
  }, { passive: true });

  lightbox.addEventListener("touchend", (e) => {
    touchEndX = e.changedTouches[0].screenX;
    const delta = touchEndX - touchStartX;

    if (Math.abs(delta) > 50) {
      if (delta < 0) {
        nextImage();
      } else {
        prevImage();
      }
      startAutoPlay();
    }
  }, { passive: true });

  /* pause autoplay if user hovers desktop buttons/image */
  [lightboxImg, lightboxPrev, lightboxNext].forEach(el => {
    el.addEventListener("mouseenter", stopAutoPlay);
    el.addEventListener("mouseleave", () => {
      if (lightbox.classList.contains("show")) startAutoPlay();
    });
  });
</script>

</body>
</html>
